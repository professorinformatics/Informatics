<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <meta name="Generator" content="EditPlus®">
  <meta name="Author" content="">
  <meta name="Keywords" content="">
  <meta name="Description" content="">
  <title>Document</title>
 </head>
 <body>
	<input type="text" id="celsius" name="celsius" style="width: 30px"/> <sup>o</sup>C
	<button type="button" onClick="add()">Add</button>
	<div style="margin: 10px; padding: 8px;">
		<b>Μέση Θερμοκρασία</b><br/>
		<div id="average" name="average" style="font-size: 18px;"></div><br/>
		<img id="averageImage" name="averageImage"/>
	</div>
	<script type="text/javascript">
		let weekCelsius = [];

		function add() {
			let c = +document.getElementById('celsius').value;
			weekCelsius.push(c);
			console.log(weekCelsius);

			let sum = 0;
			let count = weekCelsius.length;
			for (let i = 0; i < count; i++) {
				sum += weekCelsius[i];
			}
			let average = Number(sum / count).toFixed(2);
			document.getElementById('average').innerHTML = average + '<sup>o</sup>C';

			let image = '';

			if (average >= 23) {
				image = 'https://www.foreca.com/public/images/symbols/d000.svg'				
			}
			else if (average >= 19) {
				image = 'https://www.foreca.com/public/images/symbols/d200.svg';
			}
			else {
				image = 'https://www.foreca.com/public/images/symbols/d320.svg';
			}
			document.getElementById('averageImage').src = image;
		}
	</script>
 </body>
</html>
