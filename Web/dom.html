<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <title>DOM</title>
 </head>
 <body>
 	<h1 id="main-heading">Hello, World!</h1>

	<script src="https://code.jquery.com/jquery-2.1.0.js"></script>

	<script>
	var leftOffset = 0;
	var delay = 30;
	var moveHeading = function() {
		$('#main-heading').offset({ left: leftOffset });
		leftOffset++;
		if (leftOffset > 200) {
			leftOffset = 0;
			delay = 30;
		}
		delay--;
	};
	setInterval(moveHeading, delay);
	</script>
 </body>
</html>
